<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语盲盒 - 互动教学游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --bg-dark: #1e1b4b;
            --bg-card: #312e81;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
            min-height: 100vh;
            color: var(--text-light);
            overflow-x: hidden;
            font-size: 18px;
        }

        /* 页面容器 */
        .page {
            display: none;
            min-height: 100vh;
            padding: 0.5rem;
            overflow: hidden;
        }

        .page.active {
            display: flex;
            flex-direction: column;
        }

        /* 页面标题 */
        .page-header {
            text-align: center;
            padding: 0.25rem 0;
            flex-shrink: 0;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* ==================== 设置页面 ==================== */
        .setup-content {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1rem;
            min-height: 0;
        }

        /* 左侧设置面板 */
        .setup-left {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow-y: auto;
            max-height: calc(100vh - 160px);
        }

        .setup-section {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 0.6rem;
            flex-shrink: 0;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .form-group {
            margin-bottom: 0.4rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.15rem;
        }

        .form-input {
            width: 100%;
            padding: 0.5rem;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 6px;
            color: var(--text-light);
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea.form-input {
            resize: none;
            height: 80px;
            line-height: 1.3;
        }

        .time-input-group {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .time-input-group input {
            width: 60px;
            text-align: center;
        }

        .time-input-group span {
            color: var(--text-muted);
        }

        /* 作答方式选项 */
        .answer-mode-options {
            display: flex;
            gap: 0.4rem;
        }

        .answer-mode-option {
            flex: 1;
            padding: 0.4rem 0.3rem;
            background: rgba(99, 102, 241, 0.1);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .answer-mode-option:hover {
            background: rgba(99, 102, 241, 0.2);
        }

        .answer-mode-option.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.3);
        }

        .btn {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-secondary {
            background: rgba(99, 102, 241, 0.2);
            color: var(--text-light);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--secondary), #fbbf24);
            color: #1e1b4b;
        }

        .btn-small {
            padding: 0.35rem 0.5rem;
            font-size: 0.85rem;
        }

        .btn-full {
            width: 100%;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 音乐选项 */
        .music-options {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        .music-option {
            padding: 0.3rem 0.5rem;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .music-option:hover {
            background: rgba(99, 102, 241, 0.2);
        }

        .music-option.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.3);
        }

        /* 右侧盲盒展示 */
        .setup-right {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .box-grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            flex-shrink: 0;
        }

        .box-grid-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .box-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 0.75rem;
            overflow-y: auto;
            align-content: start;
        }

        .box-item {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 8px;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
        }

        .box-item:hover {
            border-color: var(--primary);
        }

        .box-item.selected {
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }

        .box-item-preview {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--secondary), #fbbf24);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 0.4rem;
        }

        .box-item-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .box-item-preview .placeholder {
            font-size: 2rem;
            color: rgba(0, 0, 0, 0.3);
        }

        .box-item-content {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .box-item-number {
            position: absolute;
            top: 4px;
            left: 4px;
            background: var(--primary);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }

        /* 底部按钮区域 */
        .start-section {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(30, 27, 75, 0.95);
            backdrop-filter: blur(10px);
            padding: 0.75rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            z-index: 100;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.3);
        }

        .setup-page {
            padding-bottom: 80px;
        }

        .btn-start {
            background: linear-gradient(135deg, var(--secondary), #fbbf24);
            color: #1e1b4b;
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.4);
        }

        /* 右下角模板列表按钮 */
        .template-list-btn-fixed {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            z-index: 100;
        }

        /* ==================== 抽取页面 ==================== */
        .draw-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 1rem;
            min-height: 0;
            overflow: hidden;
        }

        /* 左侧区域 */
        .draw-left {
            display: flex;
            flex-direction: column;
            min-height: 0;
            gap: 0.75rem;
            overflow: hidden;
        }

        /* 盲盒区域（顶部） */
        .draw-boxes-area {
            flex: 1;
            padding: 1rem;
            background: var(--bg-card);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 180px;
        }

        .draw-grid-header {
            text-align: center;
            margin-bottom: 0.75rem;
        }

        .draw-grid-info {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .draw-grid-info span {
            color: var(--secondary);
            font-weight: 700;
        }

        .draw-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
            padding: 0.25rem;
        }

        /* 盲盒样式 - 使用图片 */
        .draw-box {
            width: 120px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            overflow: hidden;
            border-radius: 12px;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .draw-box-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .draw-box::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.15);
            z-index: 1;
        }

        .draw-box-question {
            position: relative;
            z-index: 2;
            font-size: 3rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .draw-box:hover:not(.opened):not(.disabled) {
            transform: scale(1.08) rotate(3deg);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
        }

        .draw-box.disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* 9种开盒动效 */
        .draw-box.opening-1 { animation: boxOpen1 0.8s ease-out forwards; }
        .draw-box.opening-2 { animation: boxOpen2 0.8s ease-out forwards; }
        .draw-box.opening-3 { animation: boxOpen3 0.8s ease-out forwards; }
        .draw-box.opening-4 { animation: boxOpen4 0.8s ease-out forwards; }
        .draw-box.opening-5 { animation: boxOpen5 0.8s ease-out forwards; }
        .draw-box.opening-6 { animation: boxOpen6 0.8s ease-out forwards; }
        .draw-box.opening-7 { animation: boxOpen7 0.8s ease-out forwards; }
        .draw-box.opening-8 { animation: boxOpen8 0.8s ease-out forwards; }
        .draw-box.opening-9 { animation: boxOpen9 0.8s ease-out forwards; }

        @keyframes boxOpen1 {
            0% { transform: scale(1) rotateY(0deg); }
            50% { transform: scale(1.3) rotateY(180deg); }
            100% { transform: scale(0.9) rotateY(360deg); opacity: 0.7; }
        }

        @keyframes boxOpen2 {
            0% { transform: scale(1); }
            20% { transform: scale(1.2) rotate(-10deg); }
            40% { transform: scale(1.3) rotate(10deg); }
            60% { transform: scale(1.1) rotate(-5deg); }
            80% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        @keyframes boxOpen3 {
            0% { transform: scale(1) translateY(0); }
            30% { transform: scale(1.2) translateY(-30px); }
            60% { transform: scale(1.3) translateY(0); }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        @keyframes boxOpen4 {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(90deg); }
            50% { transform: scale(1.2) rotate(180deg); }
            75% { transform: scale(1.1) rotate(270deg); }
            100% { transform: scale(0.9) rotate(360deg); opacity: 0.7; }
        }

        @keyframes boxOpen5 {
            0% { transform: scale(1); filter: brightness(1); }
            25% { transform: scale(1.1); filter: brightness(1.5); }
            50% { transform: scale(1.3); filter: brightness(2); }
            75% { transform: scale(1.1); filter: brightness(1.5); }
            100% { transform: scale(0.9); filter: brightness(1); opacity: 0.7; }
        }

        @keyframes boxOpen6 {
            0% { transform: scale(1) rotateZ(0deg); }
            20% { transform: scale(1.1) rotateZ(72deg); }
            40% { transform: scale(1.2) rotateZ(144deg); }
            60% { transform: scale(1.2) rotateZ(216deg); }
            80% { transform: scale(1.1) rotateZ(288deg); }
            100% { transform: scale(0.9) rotateZ(360deg); opacity: 0.7; }
        }

        @keyframes boxOpen7 {
            0% { transform: perspective(400px) rotateY(0deg); }
            50% { transform: perspective(400px) rotateY(180deg) scale(1.2); }
            100% { transform: perspective(400px) rotateY(360deg) scale(0.9); opacity: 0.7; }
        }

        @keyframes boxOpen8 {
            0% { transform: scale(1) rotate(0deg); filter: hue-rotate(0deg); }
            25% { transform: scale(1.1) rotate(90deg); filter: hue-rotate(90deg); }
            50% { transform: scale(1.2) rotate(180deg); filter: hue-rotate(180deg); }
            75% { transform: scale(1.1) rotate(270deg); filter: hue-rotate(270deg); }
            100% { transform: scale(0.9) rotate(360deg); filter: hue-rotate(360deg); opacity: 0.7; }
        }

        @keyframes boxOpen9 {
            0% { transform: scale(1); }
            30% { transform: scale(1.1) translateY(-20px) rotate(10deg); }
            60% { transform: scale(1.2) translateY(-10px) rotate(-10deg); }
            100% { transform: scale(0.9) translateY(0) rotate(0deg); opacity: 0.7; }
        }

        .draw-box.opened {
            border-color: var(--success) !important;
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.3);
        }

        .draw-box.opened .draw-box-img {
            filter: grayscale(0.5) brightness(0.6);
        }

        .draw-box.opened::after {
            background: rgba(16, 185, 129, 0.4);
        }

        .draw-box.opened .draw-box-question {
            color: rgba(255, 255, 255, 0.9);
        }

        /* 当前盲盒展示区 */
        .current-box-area {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            flex: 1;
            display: none;
            min-height: 200px;
        }

        .current-box-area.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .current-box-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
        }

        .current-box-image {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, var(--secondary), #fbbf24);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .current-box-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .current-box-info {
            text-align: center;
        }

        .current-box-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: var(--secondary);
        }

        .current-box-text {
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            color: var(--text-light);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* 倒计时显示区域 */
        .countdown-display {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            flex: 1;
            display: none;
            min-height: 150px;
        }

        .countdown-display.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .countdown-display .countdown-number {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--secondary);
            animation: countdownPulse 1s ease-in-out infinite;
        }

        @keyframes countdownPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .countdown-display .countdown-number.ending {
            color: var(--danger);
        }

        .countdown-display .countdown-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* 前三名展示 */
        .top3-area {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            flex: 1;
            display: none;
            min-height: 150px;
        }

        .top3-area.active {
            display: block;
        }

        .top3-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            text-align: center;
            color: var(--secondary);
        }

        .top3-list {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .top3-item {
            background: rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            padding: 0.5rem;
            text-align: center;
            min-width: 80px;
        }

        .top3-item.gold {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1e1b4b;
        }

        .top3-item.silver {
            background: linear-gradient(135deg, #94a3b8, #64748b);
            color: white;
        }

        .top3-item.bronze {
            background: linear-gradient(135deg, #cd7f32, #b8860b);
            color: white;
        }

        .top3-rank {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .top3-name {
            font-size: 1rem;
            font-weight: 600;
        }

        .top3-score {
            font-size: 0.875rem;
            opacity: 0.8;
        }

        .top3-likes {
            margin-top: 0.5rem;
            display: flex;
            justify-content: center;
            gap: 0.15rem;
        }

        .top3-likes .like-finger {
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
            opacity: 0.3;
        }

        .top3-likes .like-finger:hover {
            transform: scale(1.2);
        }

        .top3-likes .like-finger.active {
            opacity: 1;
        }

        /* 作答统计区域 */
        .draw-right {
            display: flex;
            flex-direction: column;
            min-height: 0;
            height: calc(100vh - 140px);
            max-height: calc(100vh - 140px);
        }

        .answer-list {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .answer-list-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .sort-options {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            flex-shrink: 0;
        }

        #answerList {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .answer-count {
            background: var(--primary);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .answer-item {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .answer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .answer-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .answer-score {
            background: var(--secondary);
            color: #1e1b4b;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .answer-sentence {
            font-size: 0.9rem;
            color: var(--text-light);
            line-height: 1.4;
        }

        .answer-duration {
            font-size: 0.75rem;
            color: var(--secondary);
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .answer-play-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 0.2rem 0.5rem;
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            transition: all 0.2s;
        }

        .answer-play-btn:hover {
            transform: scale(1.05);
            background: var(--primary-dark);

<body>
    <!-- ==================== 设置页面 ==================== -->
    <div id="setupPage" class="page active">

        // 为盲盒分配不重复的随机样式和动效
        function assignBoxStyles() {
            const totalStyles = 9;
            const boxCount = state.boxes.length;

            // 创建样式数组1-9并打乱
            const availableStyles = [];
            const availableAnimations = [];
            for (let i = 1; i <= totalStyles; i++) {
                availableStyles.push(i);
                availableAnimations.push(i);
            }

            // Fisher-Yates 洗牌算法
            function shuffle(array) {
                const arr = [...array];
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            const shuffledStyles = shuffle(availableStyles);
            const shuffledAnimations = shuffle(availableAnimations);

            // 为每个盲盒分配样式和动效
            state.boxStyleMap = {};
            state.boxAnimationMap = {};
            for (let i = 0; i < boxCount; i++) {
                state.boxStyleMap[i] = shuffledStyles[i % totalStyles];
                state.boxAnimationMap[i] = shuffledAnimations[i % totalStyles];
            }
        }

                if (timeLeft <= 3) {

                    state.isCountingDown = false;

        // 模拟学生作答
        function simulateStudentAnswers() {
            const maxStudents = Math.floor(Math.random() * 5) + 3; // 3-7个学生作答
            let answeredCount = 0;

            const answerInterval = setInterval(() => {
                if (!state.isCountingDown || answeredCount >= maxStudents) {
                    clearInterval(answerInterval);
                    return;
                }

                // 随机选择一个未作答的学生
                const availableNames = studentNames.filter(name =>
                    !state.answers.some(a => a.name === name)
                );

                if (availableNames.length > 0) {
                    const name = availableNames[Math.floor(Math.random() * availableNames.length)];
                    const sentence = sampleSentences[Math.floor(Math.random() * sampleSentences.length)];
                    const score = Math.floor(Math.random() * 20) + 80; // 80-100分
                    const duration = (Math.random() * 3 + 1).toFixed(1); // 1-4秒语音时长

                    const answer = {
                        name: name,
                        sentence: sentence,
                        score: score,
                        duration: duration,
                        likes: 0
                    };

                    state.answers.push(answer);
                    state.allAnswers.push({
                        ...answer,
                        boxIndex: state.currentBoxIndex
                    });

                    renderAnswerList();
                    answeredCount++;
                }
            }, 800);
        }

        // 渲染点赞手指
        function renderFingers(count, type, index) {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                const activeClass = i <= count ? 'active' : '';
                html += `<span class="like-finger ${activeClass}" data-type="${type}" data-index="${index}" data-count="${i}">👍</span>`;
            }
            return html;
        }

        // 处理点赞点击
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('like-finger')) {
                const type = e.target.dataset.type;
                const index = parseInt(e.target.dataset.index);
                const count = parseInt(e.target.dataset.count);

                if (type === 'answer') {
                    state.answers[index].likes = count;
                    state.allAnswers.forEach(a => {
                        if (a.name === state.answers[index].name && a.boxIndex === state.currentBoxIndex) {
                            a.likes = count;
                        }
                    });
                    updateFingerDisplay(e.target.parentElement, count);
                } else if (type === 'top3') {
                    const top3Index = index;
                    const sorted = [...state.answers].sort((a, b) => b.score - a.score);
                    const top3 = sorted.slice(0, 3);
                    if (top3[top3Index]) {
                        top3[top3Index].likes = count;
                        state.allAnswers.forEach(a => {
                            if (a.name === top3[top3Index].name && a.boxIndex === state.currentBoxIndex) {
                                a.likes = count;
                            }
                        });
                    }
                    updateFingerDisplay(e.target.parentElement, count);

                    const boxIndex = parseInt(e.target.dataset.boxIndex);
                    const answerIndex = parseInt(e.target.dataset.answerIndex);
                    if (state.resultGroups[boxIndex] && state.resultGroups[boxIndex][answerIndex]) {
                        state.resultGroups[boxIndex][answerIndex].likes = count;
                        updateFingerDisplay(e.target.parentElement, count);
                    }

        });

                item.innerHTML = `
                    <div class="detail-answer-header">
                        <span class="detail-answer-name">${answer.name}</span>
                        <span class="detail-answer-score" id="score-${boxIndex}-${originalIndex}">${answer.score}分</span>
                    </div>
                    <div class="detail-answer-sentence">${answer.sentence}</div>
                    <div class="answer-duration" style="margin-top: 0.5rem;">
                        <button class="answer-play-btn" onclick="playSentence('${answer.sentence}')">🔊 播放</button>
                        <span>语音时长: ${answer.duration || '0.0'}s</span>
                    </div>
                    <div class="detail-answer-actions">
                        <div class="score-input-group">
                            <span>打分:</span>
                            <input type="number" class="score-input" value="${answer.score}" min="0" max="100"
                                onchange="updateScore(${boxIndex}, ${originalIndex}, this.value)">
                        </div>
                    </div>
                    <div class="like-container" style="margin-top: 0.75rem;">
                        <span class="like-label">点赞：</span>
                        ${renderDetailFingers(answer.likes || 0, boxIndex, originalIndex)}
                    </div>
                `;
                answersContainer.appendChild(item);
            });

            if (sortedAnswers.length === 0) {
                answersContainer.innerHTML += '<div style="color: var(--text-muted); text-align: center;">暂无作答</div>';
            }
        }

        // 切换详情页排序方式
        function changeDetailSort(sortMode, boxIndex) {
            state.detailSortMode = sortMode;
            const answers = state.resultGroups[boxIndex] || [];
            renderDetailAnswers(boxIndex, answers);
        }

        // 渲染详情页点赞手指
        function renderDetailFingers(count, boxIndex, answerIndex) {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                const activeClass = i <= count ? 'active' : '';
                html += `<span class="like-finger ${activeClass}" data-type="detail" data-box-index="${boxIndex}" data-answer-index="${answerIndex}" data-count="${i}">👍</span>`;
            }
            return html;
        }

        // 渲染底部Tab导航
        function renderBottomTabs(currentBoxIndex) {
            elements.bottomTabNav.innerHTML = '';

            Object.keys(state.resultGroups).forEach((boxIndex) => {
                const box = state.boxes[boxIndex];
                const tab = document.createElement('button');
                tab.className = `tab-item ${parseInt(boxIndex) === currentBoxIndex ? 'active completed' : 'completed'}`;
                tab.textContent = `#${parseInt(boxIndex) + 1} ${box.content ? box.content.split('-')[0].trim() : '盲盒'}`;
                tab.addEventListener('click', () => showResultDetail(parseInt(boxIndex)));
                elements.bottomTabNav.appendChild(tab);
            });
        }

        // 播放句子
        function playSentence(sentence) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(sentence);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                speechSynthesis.speak(utterance);
            } else {
                showToast('浏览器不支持语音播放');
            }
        }

        // 更新分数
        function updateScore(boxIndex, answerIndex, newScore) {
            const answer = state.resultGroups[boxIndex][answerIndex];
            if (answer) {
                answer.score = parseInt(newScore) || 0;
                // 更新显示
                document.getElementById(`score-${boxIndex}-${answerIndex}`).textContent = `${newScore}分`;
                showToast('分数已更新');
            }
        }

        // 返回抽取页面
        elements.backToDrawBtn.addEventListener('click', () => {
            elements.resultPage.classList.remove('active');
            elements.drawPage.classList.add('active');
            playMusic();
        });

        // 返回结果列表
        elements.detailBackBtn.addEventListener('click', () => {
            elements.resultDetailPage.classList.remove('active');
            elements.resultPage.classList.add('active');
        });

        // 重新开始
        elements.restartBtn.addEventListener('click', () => {
            elements.resultPage.classList.remove('active');
            elements.setupPage.classList.add('active');
            elements.musicToggle.classList.remove('active');

            // 重置状态
            state.answers = [];
            state.allAnswers = [];
            state.openedBoxes = [];
            state.currentBoxIndex = null;
        });

        // 返回设置
        elements.backBtn.addEventListener('click', () => {
            if (state.isCountingDown) {
                showToast('请等待倒计时结束！');
                return;
            }
            elements.drawPage.classList.remove('active');
            elements.setupPage.classList.add('active');
            stopMusic();
            elements.musicToggle.classList.remove('active');
        });

        // 音乐控制
        elements.musicToggle.addEventListener('click', () => {
            if (elements.bgMusic.paused) {
                playMusic();
                elements.musicToggle.textContent = '🔊';
            } else {
                stopMusic();
                elements.musicToggle.textContent = '🔇';
            }
        });

        // 播放音乐
        function playMusic() {
            if (state.selectedMusic === 'none') return;

            const musicUrls = {
                happy: 'https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3',
                calm: 'https://assets.mixkit.co/music/preview/mixkit-serene-view-443.mp3',
                exciting: 'https://assets.mixkit.co/music/preview/mixkit-energetic-hip-hop-821.mp3'
            };

            elements.bgMusic.src = musicUrls[state.selectedMusic];
            elements.bgMusic.volume = 0.3;
            elements.bgMusic.play().catch(() => {});
        }

        // 停止音乐
        function stopMusic() {
            elements.bgMusic.pause();
            elements.bgMusic.currentTime = 0;
        }

        // 显示提示
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => toast.remove(), 2000);
        }

        // ==================== 模板管理 ====================

        // 重置为初始状态
        function resetToInitial() {
            state.boxes = [
                { id: 1, image: null, content: '' },
                { id: 2, image: null, content: '' },
                { id: 3, image: null, content: '' }
            ];
            state.selectedBoxIndex = 0;
            state.selectedMusic = 'none';
            elements.answerTimeInput.value = 5;
            document.querySelectorAll('.music-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.music === 'none');
            });
            renderBoxGrid();
        }

        // 打开保存模板弹窗
        elements.saveTemplateBtn.addEventListener('click', () => {
            const hasContent = state.boxes.some(box => box.content.trim());
            if (!hasContent) {
                showToast('请先设置盲盒内容！');
                return;
            }
            elements.templateNameInput.value = '';
            elements.saveTemplateModal.classList.add('active');
        });

        // 取消保存模板
        elements.cancelSaveTemplate.addEventListener('click', () => {
            elements.saveTemplateModal.classList.remove('active');
        });

        // 确认保存模板
        elements.confirmSaveTemplate.addEventListener('click', () => {
            const name = elements.templateNameInput.value.trim();
            if (!name) {
                showToast('请输入模板名称！');
                return;
            }

            // 创建模板
            const template = {
                id: Date.now(),
                name: name,
                boxes: JSON.parse(JSON.stringify(state.boxes)),
                answerTime: parseInt(elements.answerTimeInput.value) || 5,
                music: state.selectedMusic,
                createdAt: new Date().toLocaleString()
            };

            state.templates.push(template);
            saveTemplates();

            elements.saveTemplateModal.classList.remove('active');
            showToast('模板保存成功！');

            // 重置为初始状态
            resetToInitial();
        });

        // 打开模板列表弹窗
        elements.templateListBtn.addEventListener('click', () => {
            renderTemplateList();
            elements.templateListModal.classList.add('active');
        });

        // 关闭模板列表弹窗
        elements.closeTemplateList.addEventListener('click', () => {
            elements.templateListModal.classList.remove('active');
        });

        // 渲染模板列表
        function renderTemplateList() {
            elements.templateList.innerHTML = '';

            if (state.templates.length === 0) {
                elements.templateList.innerHTML = '<div class="empty-template">暂无保存的模板</div>';
                return;
            }

            state.templates.forEach(template => {
                const item = document.createElement('div');
                item.className = 'template-item';
                item.innerHTML = `
                    <div class="template-info">
                        <div class="template-name">${template.name}</div>
                        <div class="template-meta">${template.boxes.length}个盲盒 | 倒计时${template.answerTime}秒 | ${template.createdAt}</div>
                    </div>
                    <div class="template-actions">
                        <button class="btn btn-success template-use-btn" data-id="${template.id}">开始抽取</button>
                        <button class="btn btn-secondary template-edit-btn" data-id="${template.id}">编辑</button>
                        <button class="btn btn-danger template-delete-btn" data-id="${template.id}">删除</button>
                    </div>
                `;
                elements.templateList.appendChild(item);
            });

            // 绑定按钮事件
            document.querySelectorAll('.template-use-btn').forEach(btn => {
                btn.addEventListener('click', () => useTemplate(parseInt(btn.dataset.id)));
            });

            document.querySelectorAll('.template-edit-btn').forEach(btn => {
                btn.addEventListener('click', () => editTemplate(parseInt(btn.dataset.id)));
            });

            document.querySelectorAll('.template-delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deleteTemplate(parseInt(btn.dataset.id)));
            });
        }

        // 使用模板（开始抽取）
        function useTemplate(templateId) {
            const template = state.templates.find(t => t.id === templateId);
            if (!template) return;

            // 加载模板数据
            state.boxes = JSON.parse(JSON.stringify(template.boxes));
            state.selectedBoxIndex = 0;
            state.selectedMusic = template.music;
            state.answerTime = template.answerTime;
            elements.answerTimeInput.value = template.answerTime;

            // 更新音乐选择
            document.querySelectorAll('.music-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.music === template.music);
            });

            // 关闭模板列表弹窗
            elements.templateListModal.classList.remove('active');

            // 检查是否有内容
            const hasContent = state.boxes.some(box => box.content.trim());
            if (!hasContent) {
                showToast('模板中没有盲盒内容！');
                return;
            }

            // 重置抽取状态
            state.answers = [];
            state.allAnswers = [];
            state.openedBoxes = [];
            state.currentBoxIndex = null;
            state.isCountingDown = false;

            // 为盲盒分配随机样式
            assignBoxStyles();

            // 切换到抽取页面
            elements.setupPage.classList.remove('active');
            elements.drawPage.classList.add('active');

            // 渲染抽取页面
            renderDrawPage();

            // 播放音乐
            playMusic();

            // 显示音乐控制
            if (state.selectedMusic !== 'none') {
                elements.musicToggle.classList.add('active');
            }

            showToast('开始抽取！');
        }

        // 编辑模板
        function editTemplate(templateId) {
            const template = state.templates.find(t => t.id === templateId);
            if (!template) return;

            // 加载模板数据进行编辑
            useTemplate(templateId);

            // 从列表中移除（编辑后会重新保存）
            state.templates = state.templates.filter(t => t.id !== templateId);
            saveTemplates();
        }

        // 删除模板
        function deleteTemplate(templateId) {
            if (!confirm('确定要删除这个模板吗？')) return;

            state.templates = state.templates.filter(t => t.id !== templateId);
            saveTemplates();
            renderTemplateList();
            showToast('模板已删除！');
        }

        // 点击弹窗外部关闭
        elements.saveTemplateModal.addEventListener('click', (e) => {
            if (e.target === elements.saveTemplateModal) {
                elements.saveTemplateModal.classList.remove('active');
            }
        });

        elements.saveTemplateModal.addEventListener('click', (e) => {
            if (e.target === elements.saveTemplateModal) {
                elements.saveTemplateModal.classList.remove('active');
            }
        });

        // 初始化
        loadTemplates();
        renderBoxGrid();

        // 排序按钮事件
        elements.sortScoreBtn.addEventListener('click', () => {
            state.currentSortMode = 'score';
            elements.sortScoreBtn.classList.add('active');
            elements.sortTimeBtn.classList.remove('active');
            renderAnswerList();
        });

        elements.sortTimeBtn.addEventListener('click', () => {
            state.currentSortMode = 'time';
            elements.sortTimeBtn.classList.add('active');
            elements.sortScoreBtn.classList.remove('active');
            renderAnswerList();
        });
    </script>
</body>
</html>
